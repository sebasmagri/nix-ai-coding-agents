name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - name: Flake check
        run: nix flake check --no-build

      - name: Build claude-code
        env:
          NIXPKGS_ALLOW_UNFREE: "1"
        run: nix build .#claude-code --no-link

      - name: Build codex
        run: nix build .#codex --no-link

      - name: Build opencode
        run: nix build .#opencode --no-link
