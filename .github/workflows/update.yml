name: Update agent versions

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - name: Update agent versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/update-agents.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet versions.json; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate flake
        if: steps.changes.outputs.has_updates == 'true'
        run: nix flake check --no-build

      - name: Create or update PR
        if: steps.changes.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="auto-update/agents"

          # Capture diff before committing
          DIFF=$(git diff versions.json)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add versions.json
          git commit -m "chore: update agent versions"
          git push --force origin "$BRANCH"

          # Build PR body
          printf '## Updated agent versions\n\n```diff\n%s\n```\n\nAuto-generated by the nightly update workflow.\n' "$DIFF" > /tmp/pr-body.md

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [[ -n "$EXISTING_PR" ]]; then
            gh pr edit "$EXISTING_PR" --body-file /tmp/pr-body.md
            echo "Updated PR #$EXISTING_PR"
          else
            gh pr create \
              --title "chore: update agent versions" \
              --body-file /tmp/pr-body.md \
              --head "$BRANCH" \
              --base main
          fi
